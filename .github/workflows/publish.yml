name: Publish to npm + Docker

on:
  push:
    tags:
      - "v*"
  # Manual re-run (e.g. after a partial failure) — version is read from package.json
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for npm trusted publishers (OIDC)
      packages: write  # required for Docker push to ghcr.io
      contents: write  # required to create the GitHub Release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.14"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run build

      - run: npm test

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/v}"
          else
            TAG="$(node -p "require('./package.json').version")"
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          echo "full=${TAG}" >> $GITHUB_OUTPUT
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT
          echo "minor=${MAJOR}.${MINOR}" >> $GITHUB_OUTPUT

      # Skip if this version is already on the registry (manual publish or re-run)
      # so a partial failure doesn't block the Docker and Release steps below.
      - name: Publish to npm
        run: |
          VERSION="${{ steps.version.outputs.full }}"
          if [ -n "$(npm view "homelab-mcp@${VERSION}" version 2>/dev/null || true)" ]; then
            echo "homelab-mcp@${VERSION} already published — skipping npm publish"
          else
            npm publish --provenance --access public
          fi

      # ── Docker image ──────────────────────────────────────────────────────────

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.major }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.minor }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.full }}

      # ── GitHub Release ─────────────────────────────────────────────────────────

      - name: Extract release notes for this version
        run: |
          awk -v ver="${{ steps.version.outputs.full }}" \
            'index($0, "## [" ver "]") == 1 {flag=1; next} /^## \[/ {flag=0} flag' \
            CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No CHANGELOG section found for ${{ steps.version.outputs.full }} — using full changelog"
            cp CHANGELOG.md RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.full }}
          body_path: RELEASE_NOTES.md
          make_latest: true
